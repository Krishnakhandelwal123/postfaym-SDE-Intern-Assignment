services:
  postgres:
    image: postgres:16-alpine
    container_name: payout-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payout
    ports:
      - "5432:5432"
    volumes:
      - payout_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payout"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  payout_pg_data:
